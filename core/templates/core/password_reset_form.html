<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI Variable", "Trebuchet MS", "Segoe UI", sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(17, 79, 214, 0.22), transparent 34%), radial-gradient(circle at 85% 12%, rgba(42, 196, 220, 0.2), transparent 24%), linear-gradient(180deg, #0f1c31 0%, #162844 42%, #edf2f8 42%, #edf2f8 100%);
            display: grid;
            place-items: center;
            padding: 28px;
        }
        .auth-shell {
            width: 100%;
            max-width: 520px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(8, 19, 38, 0.22);
            background: white;
        }
        .auth-panel {
            padding: 42px;
            background: linear-gradient(180deg, #fbfcfe 0%, #f4f7fb 100%);
        }
        .eyebrow {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #6b7a90;
            margin-bottom: 14px;
            font-weight: 700;
        }
        h2 {
            font-size: 30px;
            color: #10213d;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }
        .intro {
            color: #617289;
            margin-bottom: 26px;
            line-height: 1.6;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #334155;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid rgba(121, 144, 182, 0.3);
            border-radius: 16px;
            font-size: 14px;
            background: rgba(255,255,255,0.95);
        }
        .btn {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #114fd6, #2a79ff);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
        }
        .errorlist {
            color: #b42318;
            list-style: none;
            padding-left: 0;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        .link-text {
            margin-top: 22px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }
        .link-text a {
            color: #114fd6;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <section class="auth-panel">
            <div class="eyebrow">Account Recovery</div>
            <h2>Password Reset</h2>
            <p class="intro">Enter your account email address. In development, the reset link will appear in the server console unless you configure an email backend.</p>

            <form method="POST">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="form-group">
                    <label for="id_email">Email</label>
                    {{ form.email }}
                    {{ form.email.errors }}
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>

            <div class="link-text">
                <a href="{% url 'login' %}">Back to login</a>
            </div>
        </section>
    </div>
</body>
</html>
