<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
</head>
<body style="font-family: 'Segoe UI', sans-serif; background: #edf2f8; min-height: 100vh; display: grid; place-items: center; padding: 24px;">
    <div style="max-width: 520px; width: 100%; background: white; border-radius: 24px; padding: 36px; box-shadow: 0 24px 48px rgba(15,31,61,0.09);">
        <h1 style="font-size: 28px; margin-bottom: 10px; color: #10213d;">Set a New Password</h1>
        <p style="color: #617289; line-height: 1.6; margin-bottom: 24px;">Choose a strong new password for your account.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div style="margin-bottom: 16px;">
                {{ form.new_password1.label_tag }}
                {{ form.new_password1 }}
                {{ form.new_password1.errors }}
            </div>
            <div style="margin-bottom: 16px;">
                {{ form.new_password2.label_tag }}
                {{ form.new_password2 }}
                {{ form.new_password2.errors }}
            </div>
            <button type="submit" style="width: 100%; padding: 14px 16px; background: linear-gradient(135deg, #114fd6, #2a79ff); color: white; border: none; border-radius: 16px; font-size: 15px; font-weight: 800; cursor: pointer;">Save New Password</button>
        </form>
    </div>
</body>
</html>
