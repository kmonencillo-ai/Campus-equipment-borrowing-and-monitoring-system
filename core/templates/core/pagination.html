{% if page_obj.paginator.num_pages > 1 %}
<div class="pagination">
    <div class="muted">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</div>
    <div class="pagination-links">
        {% if page_obj.has_previous %}
            <a href="?{% if querystring %}{{ querystring }}&{% endif %}page=1">First</a>
            <a href="?{% if querystring %}{{ querystring }}&{% endif %}page={{ page_obj.previous_page_number }}">Previous</a>
        {% endif %}
        <span class="current">{{ page_obj.number }}</span>
        {% if page_obj.has_next %}
            <a href="?{% if querystring %}{{ querystring }}&{% endif %}page={{ page_obj.next_page_number }}">Next</a>
            <a href="?{% if querystring %}{{ querystring }}&{% endif %}page={{ page_obj.paginator.num_pages }}">Last</a>
        {% endif %}
    </div>
</div>
{% endif %}
